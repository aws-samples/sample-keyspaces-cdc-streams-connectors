            target-mapper = "software.amazon.ssa.streams.connector.s3.S3VectorTargetMapper"
            bucket-id = "vectory-bucket-ACCOUNTID"
            region = "us-east-1"
            max-retries = 3
            embedding-model = "amazon.titan-embed-text-v2:0"
            index-name = "movie-index"
            embedding-field = "overview"
            key-field = "title"
            metadata-fields = ["overview", "original_lang", "rel_date", "popularity", "vote_count"]
            dimensions = 256
        }
